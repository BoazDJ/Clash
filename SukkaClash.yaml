# 基础配置
mode: rule
allow-lan: true
mixed-port: 7893
udp: true
bind-address: "*"
log-level: warning
ipv6: false
unified-delay: true
tcp-concurrent: true
keep-alive-idle: 900
keep-alive-interval: 30

sniffer:
  enable: true
  parse-pure-ip: true  # 建议开启
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

  skip-domain:
    # 苹果服务 (解决无法验证服务器身份)
    - "+.push.apple.com"
    - "+.apple.com"
    - "+.icloud.com"
    - "+.itunes.com"
    - "+.me.com"
    - "+.mzstatic.com"
    # 微软服务 (解决 Hotmail/Outlook 报错)
    - "+.outlook.com"
    - "+.hotmail.com"
    - "+.microsoft.com"
    - "+.live.com"
    - "+.office.com"
    # 国内常用
    - "+.huawei.com"
    - "+.hicloud.com"
    - "+.aliyun.com"
    - "+.alicdn.com"
    - "+.weixin.qq.com"
    - "+.qq.com"
    - "+.baidu.com"
    - "Mijia Cloud"

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  strict-route: true
  mtu: 1500
  
profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: true       # 必须开启，确保 DNS 请求遵循分流规则
  prefer-h3: true
  
  # 1. 默认 DNS：仅用于解析 DOH 服务的域名 IP
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  
  # 2. 核心分流：精确控制不同域名的解析去向
  nameserver-policy:
    # 局域网、国内主流网站、Apple/微软 CDN 走国内公共 DNS
    "geosite:cn,private":
      - https://223.5.5.5/dns-query
      - https://doh.pub/dns-query
    # 针对你配置中特定的直连规则集，手动指定国内解析
    "rule-set:apple_cdn,apple_cn_non_ip,microsoft_cdn_non_ip,domestic_non_ip,direct_non_ip,lan_non_ip":
      - https://223.5.5.5/dns-query
      - https://doh.pub/dns-query

  # 3. 兜底 DNS：匹配不到 policy 的（基本都是海外/墙外域名）统统走加密 DNS
  nameserver:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query
  
  # 4. 代理节点解析：防止解析节点域名时被运营商嗅探
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query # 保证连通性
    - https://1.1.1.1/dns-query   # 保证安全性

  fake-ip-filter:
    - "rule-set:apple_cn_non_ip"
    - "rule-set:microsoft_cdn_non_ip"
    - "rule-set:lan_non_ip"
    - "+.tmall.com"
    - "+.taobao.com"
    - "+.jd.com"
    - "+.baidu.com"
    - "+.qq.com"
    - "+.ajkdn.com"
    - "+.xunlei.com" 
    - "+.sandai.net"
    - "+.hotmail.com"
    - "+.outlook.com"
    - "+.microsoft.com"
    - "msftconnecttest.com"
    - "msftncsi.com"
    - "+.local"
    - "+.lan"
    - "stun.*"
    - "*.stun.*"
    
    # 基础保留
    - "+.local"
    - "+.lan"
    - "stun.*"
    - "*.stun.*"

### 订阅基础配置 [每天更新一次订阅节点，每 300 秒一次健康检查]
NodeParam: &NodeParam {type: http, interval: 86400, health-check: {enable: true, url: 'http://connectivitycheck.platform.hicloud.com/generate_204', interval: 300}}

# 订阅合集
proxy-providers:
  VPN:
    url: 'https://api.linkedton.com/api/v1/client/subscribe?token=86be8556f990b650ad8bc616988193fd'
    <<: *NodeParam
    path: './proxy_provider/providers-1.yaml'
    override:
      additional-prefix: "[VPN] "
    # 如果还有其他订阅，可以继续添加

# Geo 数据库下载地址
# 源地址 https://github.com/MetaCubeX/meta-rules-dat
# 可以更换镜像站但不要更换其他数据库，可能导致无法启动
geox-url:
  geoip: "https://ghfast.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://ghfast.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://ghfast.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"

# 节点筛选
# 按地区筛选
FilterHK: &FilterHK '^(?=.*((?i)🇭🇰|香港|\b(HK|Hong)(\d+)?\b))(?!.*((?i)回国|校园|网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点)).*$'
FilterJP: &FilterJP '^(?=.*((?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|\b(JP|Japan)(\d+)?\b))(?!.*((?i)回国|校园|网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点)).*$'
FilterSG: &FilterSG '^(?=.*((?i)🇸🇬|新加坡|狮|\b(SG|Singapore)(\d+)?\b))(?!.*((?i)回国|校园|网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点)).*$'
FilterUS: &FilterUS '^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|\b(US|United States)(\d+)?\b))(?!.*((?i)回国|校园|网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点)).*$'
# FilterUK: &FilterUK '^(?=.*((?i)🇬🇧|英国|伦敦|\b(UK|United Kingdom)(\d+)?\b))(?!.*((?i)回国|校园|网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点)).*$'
# FilterTW: &FilterTW '^(?=.*((?i)🇹🇼|台湾|\b(TW|Tai|Taiwan)(\d+)?\b))(?!.*((?i)回国|校园|网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点)).*$'
# FilterFR: &FilterFR '^(?=.*((?i)🇫🇷|法国|\b(FR|France)(\d+)?\b))(?!.*((?i)回国|校园|网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点)).*$'
# FilterKR: &FilterKR '^(?=.*((?i)🇰🇷|韩国|韓|首尔|\b(KR|Korea)(\d+)?\b))(?!.*((?i)回国|校园|网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点)).*$'
# FilterDE: &FilterDE '^(?=.*((?i)🇩🇪|德国|\b(DE|Germany)(\d+)?\b))(?!.*((?i)回国|校园|网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点)).*$'
# FilterOthers: &FilterOthers '^(?!.*(🇭🇰|HK|Hong|香港|🇹🇼|TW|Taiwan|Wan|🇯🇵|JP|Japan|日本|🇸🇬|SG|Singapore|狮城|🇺🇸|US|United States|America|美国|🇩🇪|DE|Germany|德国|🇬🇧|UK|United Kingdom|英国|🇰🇷|KR|Korea|韩国|韓|🇫🇷|FR|France|法国)).*$'
# FilterAll: &FilterAll '^(?=.*(.))(?!.*((?i)群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|(\b(USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author)\b|(\d{4}-\d{2}-\d{2}|\d+G)))).*$'
### 策略组基础配置
# 手动选择
Select: &Select {type: select, url: 'http://cp.cloudflare.com/generate_204', disable-udp: false, hidden: false, include-all: true}
# 自动选择 [每 300 秒一次惰性健康检查，容差 50ms，时延超过 2 秒判定为失败，失败 3 次自动触发健康检查]
UrlTest: &UrlTest {type: url-test, url: 'http://cp.cloudflare.com/generate_204', interval: 300, lazy: true, tolerance: 50, timeout: 2000, disable-udp: false, max-failed-times: 3, hidden: false, include-all: true}
# 自动回退 [每 300 秒一次惰性健康检查，时延超过 2 秒判定为失败，失败 3 次自动触发健康检查]
FallBack: &FallBack {type: fallback, url: 'http://cp.cloudflare.com/generate_204', interval: 300, lazy: true, timeout: 2000, disable-udp: false, max-failed-times: 3, hidden: false, include-all: true}
# 负载均衡 [每 300 秒一次惰性健康检查，时延超过 2 秒判定为失败，失败 3 次则自动触发健康检查]
LoadBalance: &LoadBalance {type: load-balance, url: 'http://cp.cloudflare.com/generate_204', interval: 300, lazy: true, disable-udp: false, strategy: consistent-hashing, timeout: 2000, max-failed-times: 3, hidden: false, include-all: true}

# 策略组
proxy-groups:
  # 主选择组
  - {name: Proxy, type: select, proxies: [🇯🇵 JP, 🇭🇰 HK, 🇸🇬 SG, 🇺🇸 US]}

   # 应用分组
  - {name: Telegram, type: fallback, proxies: [Proxy, 🇸🇬 SG, 🇯🇵 JP, 🇭🇰 HK, 🇺🇸 US]}
  - {name: AIGC, type: select, proxies: [Proxy, 🇺🇸 US, 🇸🇬 SG, 🇯🇵 JP, 🇭🇰 HK]}
  - {name: Apple, type: select, proxies: [Proxy, DIRECT, 🇸🇬 SG, 🇯🇵 JP, 🇭🇰 HK, 🇺🇸 US]}
  - {name: Microsoft, type: select, proxies: [Proxy, DIRECT, 🇸🇬 SG, 🇯🇵 JP, 🇭🇰 HK, 🇺🇸 US]}
  - {name: Download, type: select, proxies: [DIRECT, Proxy, 🇸🇬 SG, 🇯🇵 JP, 🇭🇰 HK, 🇺🇸 US]}
  
  # 自动选择 - 按地区
  - {name: 🇯🇵 JP, <<: *UrlTest, filter: *FilterJP}
  - {name: 🇸🇬 SG, <<: *UrlTest, filter: *FilterSG}
  - {name: 🇺🇸 US, <<: *Select, filter: *FilterUS}
  - {name: 🇭🇰 HK, <<: *Select, filter: *FilterHK}
  
  #兜底
  - {name: Final, type: select, proxies: [DIRECT, Proxy]}
  
